<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css?v=21" />
</head>
<body>
  <section class="lock-screen" id="lockScreen" aria-label="Lock screen">
    <div class="lock-time-wrap">
      <div class="lock-date" id="lockDate">Tuesday, May 19</div>
      <div class="lock-time" id="lockTime" aria-label="9:41">
        <span>9</span><span class="lock-time-colon" aria-hidden="true"></span><span>41</span>
      </div>
      <div class="lock-location" aria-label="Current location">
        <span class="lock-location-dot" aria-hidden="true"></span>
        Ashburn, VA
      </div>
    </div>

    <div class="lock-content" aria-label="Quick facts about Rohit">
      <div class="lock-profile">
        <img src="./icons/me.png" alt="Rohit Rao" />
      </div>
      <div class="lock-widgets">
        <div class="lock-widget large">
          <span class="lock-widget-label">Rohit Rao</span>
          <strong>Software Engineer at Collins Aerospace</strong>
          <span class="lock-widget-subtitle">Interests: Software, AI/ML, Product Development</span>
        </div>
        <div class="lock-widget">
          <span class="lock-widget-label">Focus</span>
          <strong>Software, data, and product-minded projects</strong>
        </div>
        <div class="lock-widget">
          <span class="lock-widget-label">Links</span>
          <strong>GitHub, LinkedIn, and projects inside</strong>
        </div>
      </div>
    </div>

    <div class="lock-notifications" aria-label="Currently working on">
      <div class="lock-notification-title">Currently Working On</div>
      <div class="lock-notification-list" id="currentWorkList"></div>
    </div>

    <button class="unlock-control" id="unlockControl" type="button" aria-label="Unlock and enter site">
      <span>Swipe up for more</span>
      <i></i>
    </button>
  </section>

  <aside class="status-rail">
    <div class="status-top">
      <button class="rail-lock-button" id="lockButton" type="button" aria-label="Lock screen"></button>
    </div>

    <div class="status-icons" id="railApps"></div>

    <div class="status-bottom">
      <button class="apps-button" id="homeButton" type="button" aria-label="Go to page 1"></button>
    </div>
  </aside>

  <main class="pager" id="pager"></main>
  <nav class="dots" id="dots"></nav>

  <script type="module" src="./app.js?v=21"></script>
</body>
</html>
