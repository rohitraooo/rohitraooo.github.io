<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css?v=10" />
</head>
<body>
  <section class="lock-screen" id="lockScreen" aria-label="Lock screen">
    <div class="lock-status">
      <div class="lock-dynamic-island" aria-hidden="true"></div>
      <div class="lock-system-icons" aria-hidden="true">
        <div class="lock-bars"><span></span><span></span><span></span><span></span></div>
        <div class="lock-wifi"></div>
        <div class="lock-battery"><span></span></div>
      </div>
    </div>

    <div class="lock-time-wrap">
      <div class="lock-date" id="lockDate">Tuesday, May 19</div>
      <div class="lock-time" id="lockTime">9:41</div>
    </div>

    <div class="lock-content" aria-label="Quick facts about Rohit">
      <div class="lock-profile">
        <img src="./icons/me.png" alt="Rohit Rao" />
      </div>
      <div class="lock-widgets">
        <div class="lock-widget large">
          <span class="lock-widget-label">Rohit Rao</span>
          <strong>Developer building clean, useful digital experiences.</strong>
        </div>
        <div class="lock-widget">
          <span class="lock-widget-label">Focus</span>
          <strong>Software, data, and product-minded projects</strong>
        </div>
        <div class="lock-widget">
          <span class="lock-widget-label">Links</span>
          <strong>GitHub, LinkedIn, Spotify, and projects inside</strong>
        </div>
      </div>
    </div>

    <div class="lock-actions" aria-hidden="true">
      <div class="lock-action-btn flashlight"></div>
      <div class="lock-action-btn camera"></div>
    </div>

    <button class="unlock-control" id="unlockControl" type="button" aria-label="Unlock and enter site">
      <span>Swipe up to unlock</span>
      <i></i>
    </button>
  </section>

  <aside class="status-rail">
    <div class="status-top">
      <div class="time" id="time">13:02</div>
      <div class="net-row">
        <div class="signal">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="network">LTE</div>
      </div>
    </div>

    <div class="status-icons" id="railApps"></div>

    <div class="status-bottom">
      <button class="apps-button" id="homeButton" type="button" aria-label="Go to page 1"></button>
    </div>
  </aside>

  <main class="pager" id="pager"></main>
  <nav class="dots" id="dots"></nav>

  <script type="module" src="./app.js?v=10"></script>
</body>
</html>
